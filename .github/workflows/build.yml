name: Build戀芯.exe

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 取得專案原始碼
        uses: actions/checkout@v3

      - name: 安裝 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝依賴套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包為 .exe
        run: |
          pyinstaller --noconfirm lianxin_launcher.spec

      - name: 上傳打包結果
        uses: actions/upload-artifact@v4
        with:
          name: lianxin-exe
          path: dist/lianxin_launcher/**
